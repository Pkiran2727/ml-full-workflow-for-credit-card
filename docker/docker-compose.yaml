services:
  scoring-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow-ui:
    image: python:3.12.8-slim
    command: >
      bash -c "pip install mlflow>=2.9 && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/mlruns
    profiles:
      - monitoring  # Only start with: docker compose --profile monitoring up
